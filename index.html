<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ufaseat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- ===== AUTH SCREEN ===== -->
  <div id="auth-screen" class="screen">
    <div class="auth-deco auth-deco1"></div>
    <div class="auth-deco auth-deco2"></div>
    <div class="auth-deco auth-deco3"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-badge">🪑</div>
        <h1>UFAseat</h1>
        <p class="auth-tagline">オフィスの今が、ひと目でわかる</p>
      </div>

      <div class="tab-group">
        <button class="tab-btn active" data-tab="login">ログイン</button>
        <button class="tab-btn" data-tab="register">新規登録</button>
      </div>

      <form id="auth-form">
        <div id="name-field" class="field hidden">
          <label>表示名</label>
          <input type="text" id="display-name" placeholder="例: 山田 太郎" />
        </div>
        <div class="field">
          <label>メールアドレス</label>
          <input type="email" id="email" placeholder="example@ufas.co.jp" required />
        </div>
        <div class="field">
          <label>パスワード</label>
          <input type="password" id="password" placeholder="6文字以上" required />
        </div>
        <p id="auth-error" class="error-msg hidden"></p>
        <button type="submit" class="btn-primary" id="auth-submit">ログイン</button>
      </form>
    </div>
  </div>

  <!-- ===== AVATAR SETUP SCREEN ===== -->
  <div id="avatar-screen" class="screen hidden">
    <div class="avatar-card">
      <h2>✨ アバターをつくろう</h2>
      <p class="sub">スタイルを選んでカスタマイズしよう</p>

      <div class="preset-grid" id="preset-grid"></div>

      <div class="skin-section">
        <label>🌸 肌の色</label>
        <div class="color-group" id="opt-skin">
          <button class="color-btn active" data-val="pale"     style="background:#f8d5c2" title="ライト"></button>
          <button class="color-btn"        data-val="light"    style="background:#eac393" title="ナチュラル"></button>
          <button class="color-btn"        data-val="tanned"   style="background:#c68642" title="タン"></button>
          <button class="color-btn"        data-val="brown"    style="background:#8d5524" title="ブラウン"></button>
          <button class="color-btn"        data-val="dark"     style="background:#4a2511" title="ダーク"></button>
        </div>
      </div>

      <button class="btn-primary" id="save-avatar">✨ この設定ではじめる</button>
    </div>
  </div>

  <!-- ===== MAIN APP SCREEN ===== -->
  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <div class="header-left">
        <span class="logo-icon-sm">🪑</span>
        <span class="app-title">UFAseat</span>
      </div>
      <div class="header-center">
        <div class="status-selector" id="status-selector">
          <button class="status-btn active" data-status="in_office">🟢 着席中</button>
          <button class="status-btn" data-status="away">🟡 離席中</button>
          <button class="status-btn" data-status="meeting">🔴 会議中</button>
          <button class="status-btn" data-status="telework">🔵 テレワーク</button>
        </div>
      </div>
      <div class="header-right">
        <div class="me-avatar-wrap" id="me-avatar-wrap">
          <img id="me-avatar" src="" alt="" />
          <span id="me-name"></span>
        </div>
        <button class="btn-icon" id="edit-avatar-btn" title="アバター編集">✏️</button>
        <button class="btn-icon" id="logout-btn" title="ログアウト">🚪</button>
      </div>
    </header>

    <main class="app-body">
      <!-- Seat Map -->
      <div class="map-wrap">
        <div class="office-map">
          <div class="map-label-top">窓</div>

          <div class="islands-container">
            <!-- Island B (奥) -->
            <div class="island" id="island-B">
              <div class="island-label">島B（奥）</div>
              <div class="seat-row row-top" id="row-B-top"></div>
              <div class="desk-divider"></div>
              <div class="seat-row row-bottom" id="row-B-bottom"></div>
            </div>

            <!-- Island A (手前) -->
            <div class="island" id="island-A">
              <div class="island-label">島A（手前）</div>
              <div class="seat-row row-top" id="row-A-top"></div>
              <div class="desk-divider"></div>
              <div class="seat-row row-bottom" id="row-A-bottom"></div>
            </div>
          </div>

          <div class="map-label-bottom">入り口 →</div>
        </div>
      </div>

      <!-- Side Panel -->
      <aside class="side-panel">
        <h3 class="panel-title">👥 出社メンバー</h3>
        <div id="member-list"></div>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
